<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIAVAC - Fich Afektasyon</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
font-family:Arial;
background:#eee;
padding:8px;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:12px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#pdf{
width:100%;
}

/* PAGE */
.page{
padding:15px;
box-sizing:border-box;
}

/* HEADER */
.header{
text-align:center;
margin-bottom:10px;
}

.header img{
width:75px;
}

.header h1{
color:#003366;
margin:5px 0;
font-size:22px;
}

.header h3{
font-size:14px;
}

/* SECTION */
.section{
margin-top:12px;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
}

.title{
background:#003366;
color:#fff;
padding:6px;
border-radius:5px;
font-size:13px;
}

label{
display:block;
margin-top:8px;
font-weight:bold;
font-size:13px;
}

input{
width:100%;
padding:9px;
margin-top:4px;
border:1px solid #aaa;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
margin-top:15px;
padding:12px;
background:#003366;
color:#fff;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#0050a5;
}
</style>
</head>

<body>

<div class="container" id="pdf">

<div class="page">

<!-- HEADER -->
<div class="header">
<img src="https://i.ibb.co/zTz2rrh8/sketch-1782265870898.jpg">
<h1>SIAVAC</h1>
<h3>Fich Afektasyon Ajan</h3>
</div>

<!-- ID -->
<div class="section">
<div class="title">ID SIAVAC</div>

<label>Nimewo Dosye</label>
<input type="text" id="siavac_id" readonly>
</div>

<!-- AGENT INFO -->
<div class="section">
<div class="title">ENFÒMASYON AJAN</div>

<label>Non Ajan</label>
<input type="text" placeholder="Ekri non konplè ajan">

<label>Fonksyon</label>
<input type="text" placeholder="Eg: Ajan Ankèt / Sekirite">

<label>Telefòn</label>
<input type="text" placeholder="+509 ...">
</div>

<!-- AFFECTATION -->
<div class="section">
<div class="title">DETAY AFEKTASYON</div>

<label>Zòn Afektasyon</label>
<input type="text" placeholder="Eg: Port-au-Prince / Zone ...">

<label>Dat Kòmansman</label>
<input type="date">
</div>

<!-- DECLARATION -->
<div class="section">
<div class="title">DEKLARASYON</div>

<p style="font-size:13px;line-height:20px;">
Dokiman sa se yon fich afektasyon ofisyèl SIAVAC ki konfime plasman ajan an nan yon zòn sèvis.
</p>
</div>

</div>

<button onclick="downloadPDF()">📄 Telechaje Fich la</button>

</div>

<script>

// 🔥 ID OTOMATIK SIAVAC
function generateID(){
const year = new Date().getFullYear();
const rand = Math.floor(100000 + Math.random()*900000);
document.getElementById("siavac_id").value =
"SIAVAC-AFF-" + year + "-" + rand;
}

window.onload = generateID;

// 📄 PDF DOWNLOAD
function downloadPDF(){
const element = document.getElementById("pdf");

html2pdf().set({
margin: 8,
filename: 'SIAVAC_Fich_Afektasyon.pdf',
image: { type: 'jpeg', quality: 0.98 },
html2canvas: {
scale: 2,
useCORS: true,
scrollY: 0
},
jsPDF: {
unit: 'mm',
format: 'a4',
orientation: 'portrait'
}
}).from(element).save();
}

</script>

</body>
</html>
